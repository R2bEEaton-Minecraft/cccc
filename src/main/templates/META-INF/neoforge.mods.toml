modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayTest="IGNORE_SERVER_VERSION"
description='''
Allows the Critters and Companions grappling hook to attach to and ride
Create contraptions — both stationary (bearings, chassis) and moving
(pistons, rope pulleys, aeronautics ships).
'''
authors="R2bEEaton"

[[mixins]]
config="${mod_id}.mixins.json"

# NeoForge
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

# Minecraft
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Create — must load before us so contraption entities are registered
[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[6.0.0,)"
    ordering="AFTER"
    side="BOTH"

# Critters and Companions — must load before us so the hook entity is registered
[[dependencies.${mod_id}]]
    modId="crittersandcompanions"
    type="required"
    versionRange="[2.6.0,)"
    ordering="AFTER"
    side="BOTH"

# Create Aeronautics — optional; its contraptions are AbstractContraptionEntity subclasses
# and are supported automatically without extra code.
[[dependencies.${mod_id}]]
    modId="createaeronautics"
    type="optional"
    versionRange="[1.0.0,)"
    ordering="AFTER"
    side="BOTH"
